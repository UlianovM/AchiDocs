source = ~/.config/hypr/source/2_autostart.conf



# bind = MODS, key, dispatcher, params

########################################################################################################################
# Quick run
bind = SUPER,       E, exec, $fileManager
bind = SUPER,   grave, exec, $terminal
bind = SUPER,       R, exec, $menu
bind = SUPER,       C, exec, $pick1
bind = SUPER SHIFT, C, exec, $pick2

########################################################################################################################
# ScreenShots
bind = SUPER,       Print, exec, $screenshot1
bind = SUPER SHIFT, Print, exec, $screenshot2

########################################################################################################################
# Window manegment
bind = SUPER, F, togglefloating,
bind = SUPER, Q, killactive,
bind = SUPER, V, layoutmsg, togglesplit

bind = SUPER, Delete, exit,

bind = , F11, fullscreen,
bind = ALT, Tab, cyclenext,

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

########################################################################################################################
# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, 0, movetoworkspacesilent, 10

bind = SUPER, S, togglespecialworkspace, terminal
bind = SUPER SHIFT, S, movetoworkspace, special:terminal

bind = SUPER, Escape, togglespecialworkspace, monitor
bind = SUPER SHIFT, Escape, movetoworkspace, special:monitor

bind = SUPER, T, togglespecialworkspace, tg
bind = SUPER SHIFT, T, togglespecialworkspace, special:tg

########################################################################################################################
# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,    XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = ,    XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = ALT, XF86MonBrightnessUp,   exec, brightnessctl set 100%+
bindel = ALT, XF86MonBrightnessDown, exec, brightnessctl set 100%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = ALT, XF86AudioNext, exec, playerctl position 5+
bindl = ALT, XF86AudioPrev, exec, playerctl position 5-
