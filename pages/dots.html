<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>AchiDocs dots</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../src/style/root.css">
        <link rel="stylesheet" href="../src/style/pages.css">
    </head>
    <body>
        <div class="overlay" onclick="hideOverlay()"></div>
        
        <div class="layout">
            <header onclick="hideOverlay()">
                <h1><a href="../index.html">dots</a></h1>
            </header>
            <main>
                <menu class="side">
                </menu>
                <div class="content">
                    <button class="side-btn menu"
                        onclick="toggleMenu()">
                    </button>
                    <button class="side-btn nav"
                        onclick="toggleNav()">
                    </button>

                    <h2><code>/etc</code></h2>
                    <div class="block">
                        <h3 id="locale_conf"><code>locale.conf</code></h3>
                        <div class="code-block">
                            <div class="code-head">
                                <div class="filepath"><pat>/etc/</pat><fil>locale.conf</fil></div>
                                <div class="code-type move">conf</div>
                                <button class="copy">󰆏</button>
                            </div>
                            <div class="code-body">
                                <div class="line-numbers">
                                    <div>1</div><div>2</div><div>3</div>
                                </div>
                                <div class="line-content">
                                    <code><cnt>LANG</cnt>=<str>en_US</str></code>
                                    <code><cnt>LANGUAGE</cnt>=<str>en_US<esc>:</esc>en<esc>:</esc>C</str></code>
                                </div>
                            </div>
                        </div>
                        <div class="code-block">
                            <div class="code-head">
                                <div class="filepath"><pat>/etc/</pat><fil>locale.conf</fil></div>
                                <div class="code-type move">conf</div>
                                <button class="copy">󰆏</button>
                            </div>
                            <div class="code-body">
                                <div class="line-numbers">
                                    <div>1</div><div>2</div><div>3</div>
                                </div>
                                <div class="line-content">
                                    <code><cnt>LANG</cnt>=<str>ru_RU</str></code>
                                    <code><cnt>LANGUAGE</cnt>=<str>ru_RU<esc>:</esc>en_US<esc>:</esc>en<esc>:</esc>C</str></code>
                                </div>
                            </div>
                        </div>

                        <h3 id="vconsole_conf"><code>vconsole.conf</code></h3>
                        <div class="code-block">
                            <div class="code-head">
                                <div class="filepath"><pat>/etc/</pat><fil>vconsole.conf</fil></div>
                                <div class="code-type move">conf</div>
                                <button class="copy">󰆏</button>
                            </div>
                            <div class="code-body">
                                <div class="line-numbers">
                                    <div>1</div><div>2</div><div>3</div>
                                </div>
                                <div class="line-content">
                                    <code><cnt>KEYMAP</cnt>=<str>en</str></code>
                                    <code><cnt>FONT</cnt>=<str>default8x16</str></code>
                                </div>
                            </div>
                        </div>
                        <div class="code-block">
                            <div class="code-head">
                                <div class="filepath"><pat>/etc/</pat><fil>vconsole.conf</fil></div>
                                <div class="code-type move">conf</div>
                                <button class="copy">󰆏</button>
                            </div>
                            <div class="code-body">
                                <div class="line-numbers">
                                    <div>1</div><div>2</div><div>3</div>
                                </div>
                                <div class="line-content">
                                    <code><cnt>KEYMAP</cnt>=<str>ru</str></code>
                                    <code><cnt>FONT</cnt>=<str>cyr-sun16</str></code>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <nav class="side">
                </nav>
            </main>
        </div>
    </body>
</html>
